<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xarvis AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
      max-width: 600px;
    }

    .cta {
      margin-top: 30px;
      padding: 15px 30px;
      background: #6c5ce7;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 1.1rem;
      transition: 0.3s;
    }

    .cta:hover {
      background: #8577ff;
      transform: scale(1.05);
    }

    .badge {
      margin-top: 15px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <div class="badge">Xarvis AI • Next Gen Creator System</div>

  <h1>Welcome to Xarvis AI</h1>

  <p>
    Your AI-powered creator engine. Build content, automate ideas, and scale faster than ever.
  </p>

  <!-- BUTTON THAT OPENS YOUR SECOND PAGE -->
  <a class="cta" href="app.html">
    🚀 Launch Xarvis
  </a>

</body>
</html>
