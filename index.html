<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xarvis AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --text:      #e8e8f0;
      --muted:     #5a5a7a;
      --user-bg:   #16162a;
      --ai-bg:     #0f0f1c;
      --radius:    14px;
      --font-ui:   'Syne', sans-serif;
      --font-code: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    /* ── Layout ─────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: conic-gradient(from 180deg, var(--accent), var(--accent2), var(--accent));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 800;
      color: #000;
      letter-spacing: -1px;
      animation: spin-hue 6s linear infinite;
    }

    @keyframes spin-hue {
      to { filter: hue-rotate(360deg); }
    }

    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-code);
      font-size: 11px;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .status-dot.error  { background: #ef4444; }

    /* ── Chat container ─────────────────────────────────── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Empty state ────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
      animation: fade-up 0.6s ease;
    }

    #empty-state .big-x {
      font-size: 56px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    #empty-state h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    #empty-state p {
      font-size: 14px;
      max-width: 340px;
      line-height: 1.6;
    }

    .suggested-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggested-prompts button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-ui);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggested-prompts button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Messages ───────────────────────────────────────── */
    .message {
      display: flex;
      gap: 12px;
      animation: fade-up 0.3s ease;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
    }

    .message.user .avatar {
      background: var(--user-bg);
      border: 1px solid var(--border);
      color: var(--accent);
    }

    .message.ai .avatar {
      background: conic-gradient(from 180deg, var(--accent), var(--accent2), var(--accent));
      color: #000;
      font-weight: 800;
    }

    .bubble {
      flex: 1;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* ── Typing indicator ───────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 6px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40%            { opacity: 1;   transform: scale(1); }
    }

    /* ── Input area ─────────────────────────────────────── */
    #input-area {
      padding: 16px 24px 24px;
      flex-shrink: 0;
    }

    #input-form {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    #input-form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #00e5ff14;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      min-height: 24px;
      max-height: 160px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    #send-btn:hover:not(:disabled) {
      background: #33ebff;
      transform: scale(1.05);
    }

    #send-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    #send-btn svg { width: 16px; height: 16px; }

    .input-footer {
      display: flex;
      justify-content: center;
      padding-top: 10px;
      font-family: var(--font-code);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Error toast ────────────────────────────────────── */
    #error-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a0a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
      font-family: var(--font-code);
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 100;
      max-width: 90vw;
      text-align: center;
    }

    #error-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header>
    <div class="logo-mark">X</div>
    <div class="logo-text">Xarvis <span>AI</span></div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">checking...</span>
    </div>
  </header>

  <!-- Chat -->
  <div id="chat-container">
    <div id="empty-state">
      <div class="big-x">X</div>
      <h2>Xarvis AI is ready.</h2>
      <p>Ask me anything — I'm fast, sharp, and built to help you build.</p>
      <div class="suggested-prompts">
        <button onclick="fillPrompt('What can you help me build?')">What can you help me build?</button>
        <button onclick="fillPrompt('Write me a YouTube script about discipline')">YouTube script on discipline</button>
        <button onclick="fillPrompt('Give me 5 viral video ideas')">5 viral video ideas</button>
        <button onclick="fillPrompt('How do I reach 6 figures online?')">6 figures online</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <div id="input-form">
      <textarea
        id="user-input"
        placeholder="Message Xarvis AI..."
        rows="1"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button id="send-btn" onclick="handleSend()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">Xarvis AI · Powered by Groq</div>
  </div>
</div>

<!-- Error toast -->
<div id="error-toast"></div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const BACKEND_URL = "http://localhost:3001"; // ← Change this to your deployed backend URL

  // ── STATE ─────────────────────────────────────────────────────────────────
  let conversationHistory = [];
  let isLoading = false;

  // ── CORE API FUNCTION (single source of truth for all requests) ───────────
  async function apiRequest(path, payload) {
    const response = await fetch(`${BACKEND_URL}/api${path}`, {
      method: payload ? "POST" : "GET",
      headers: { "Content-Type": "application/json" },
      body: payload ? JSON.stringify(payload) : undefined,
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || `Request failed: ${response.status}`);
    }

    return data;
  }

  // ── DOM HELPERS ───────────────────────────────────────────────────────────
  const chatContainer   = document.getElementById("chat-container");
  const userInput       = document.getElementById("user-input");
  const sendBtn         = document.getElementById("send-btn");
  const emptyState      = document.getElementById("empty-state");
  const statusDot       = document.getElementById("status-dot");
  const statusText      = document.getElementById("status-text");
  const errorToast      = document.getElementById("error-toast");

  function hideEmptyState() {
    if (emptyState) emptyState.remove();
  }

  function appendMessage(role, text) {
    hideEmptyState();
    const msg = document.createElement("div");
    msg.className = `message ${role}`;
    msg.innerHTML = `
      <div class="avatar">${role === "user" ? "U" : "X"}</div>
      <div class="bubble">${escapeHtml(text)}</div>
    `;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return msg;
  }

  function appendTyping() {
    hideEmptyState();
    const msg = document.createElement("div");
    msg.className = "message ai";
    msg.id = "typing-msg";
    msg.innerHTML = `
      <div class="avatar">X</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return msg;
  }

  function removeTyping() {
    document.getElementById("typing-msg")?.remove();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function showError(msg) {
    errorToast.textContent = `⚠ ${msg}`;
    errorToast.classList.add("show");
    setTimeout(() => errorToast.classList.remove("show"), 4000);
  }

  function setLoading(val) {
    isLoading = val;
    sendBtn.disabled = val || userInput.value.trim() === "";
  }

  // ── SEND HANDLER ─────────────────────────────────────────────────────────
  async function handleSend() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    userInput.value = "";
    autoResize();
    setLoading(true);

    // Add to history
    conversationHistory.push({ role: "user", content: text });
    appendMessage("user", text);
    appendTyping();

    try {
      const data = await apiRequest("/chat", {
        messages: conversationHistory,
        systemPrompt: "You are Xarvis AI — a sharp, direct, and highly capable assistant focused on helping creators and entrepreneurs build wealth, grow online, and execute big ideas. Be concise but insightful.",
      });

      removeTyping();
      const reply = data.reply || "(no response)";
      conversationHistory.push({ role: "assistant", content: reply });
      appendMessage("ai", reply);
    } catch (err) {
      removeTyping();
      showError(err.message);
      conversationHistory.pop(); // Remove failed user message from history
    } finally {
      setLoading(false);
      userInput.focus();
    }
  }

  // ── TEXTAREA AUTO-RESIZE ──────────────────────────────────────────────────
  function autoResize() {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + "px";
    sendBtn.disabled = isLoading || userInput.value.trim() === "";
  }

  userInput.addEventListener("input", autoResize);

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // ── SUGGESTED PROMPTS ────────────────────────────────────────────────────
  function fillPrompt(text) {
    userInput.value = text;
    autoResize();
    userInput.focus();
  }

  // ── HEALTH CHECK ─────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const data = await apiRequest("/health");
      if (data.status === "running") {
        statusDot.classList.add("online");
        statusText.textContent = "online";
      }
    } catch {
      statusDot.classList.add("error");
      statusText.textContent = "offline";
    }
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  checkHealth();
  userInput.focus();
</script>
</body>
</html>
