<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xarvis AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #05050a;
      color: white;
      overflow-x: hidden;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.6);
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-weight: 800;
      font-size: 20px;
      font-family: Syne;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero h1 {
      font-size: 60px;
      font-family: Syne;
      margin-bottom: 10px;
    }

    .hero span {
      background: linear-gradient(90deg,#7c3aed,#06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: #aaa;
      max-width: 600px;
      margin: auto;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: linear-gradient(90deg,#7c3aed,#06b6d4);
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px;
    }

    .box {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      margin-top: 30px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin-bottom: 10px;
      background: #222;
      color: white;
    }

    #result {
      margin-top: 15px;
      color: #06b6d4;
      font-weight: 600;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">Xarvis AI</div>
</nav>

<div class="hero">
  <h1>Your <span>AI Co-Founder</span></h1>
  <p>Turn ideas into viral content using AI-powered intelligence and strategy.</p>
</div>

<div class="container">

  <div class="box">
    <h2>🔥 Try Xarvis AI</h2>

    <input id="input" placeholder="Enter your idea..." />

    <button class="btn" onclick="send()">Generate Insight</button>

    <div id="result"></div>
  </div>

</div>

<script>
async function send() {
  const message = document.getElementById("input").value;

  document.getElementById("result").innerText = "Thinking...";

  const res = await fetch("http://localhost:3001/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  document.getElementById("result").innerText = data.reply;
}
</script>

</body>
</html>
