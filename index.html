<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xarvis AI — Your AI Co-Founder for Content Creators</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #050810;
      --surface: #0d1120;
      --border: rgba(255,255,255,0.07);
      --accent: #4f8eff;
      --accent2: #7c3aff;
      --text: #f0f4ff;
      --muted: #8895b0;
      --card: rgba(255,255,255,0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ===== SPLASH ===== */
    #splash {
      position: fixed;
      inset: 0;
      background: #020408;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-logo {
      font-family: 'Syne', sans-serif;
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .splash-launch-btn {
      padding: 14px 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== MAIN ===== */
    #main-site {
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #main-site.visible {
      opacity: 1;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 5%;
      border-bottom: 1px solid var(--border);
      background: rgba(5,8,16,0.85);
      backdrop-filter: blur(10px);
    }

    .nav-logo {
      font-family: 'Syne';
      font-weight: 800;
      color: white;
      text-decoration: none;
    }

    .nav-links a {
      margin: 0 12px;
      color: var(--muted);
      text-decoration: none;
    }

    .nav-cta {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 8px 18px;
      border-radius: 50px;
      color: white;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 120px 5%;
    }

    .hero h1 {
      font-size: 3rem;
      font-family: 'Syne';
    }

    .hero h1 span {
      color: var(--accent);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 14px 30px;
      border-radius: 50px;
      color: white;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    /* FEATURES (kept minimal for clarity) */
    section {
      padding: 80px 5%;
    }

    .plan-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 50px;
      background: var(--card);
      color: white;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- ===== SPLASH ===== -->
<div id="splash">
  <div class="splash-logo">Xarvis AI</div>
  <button class="splash-launch-btn" onclick="launchApp()">🚀 Launch App</button>
</div>

<!-- ===== MAIN ===== -->
<div id="main-site">

  <nav>
    <a href="#" class="nav-logo">Xarvis AI</a>
    <div class="nav-links">
      <a href="#features">Features</a>
      <a href="#pricing">Pricing</a>
    </div>

    <!-- FIXED -->
    <a onclick="goToApp()" class="nav-cta" style="cursor:pointer;">Launch App</a>
  </nav>

  <section class="hero">
    <h1>Your AI Co-Founder <span>for Going Viral</span></h1>
    <p>Build content, grow faster, and monetize smarter.</p>

    <!-- FIXED -->
    <a onclick="goToApp()" class="btn-primary" style="cursor:pointer;">🚀 Launch App</a>
  </section>

  <!-- PRICING -->
  <section id="pricing">
    <h2>Pricing</h2>

    <!-- FIXED PLAN BUTTONS -->
    <div>
      <a onclick="goToApp('starter')" class="plan-btn">Starter</a>
      <a onclick="goToApp('pro')" class="plan-btn">Creator Pro</a>
      <a onclick="goToApp('elite')" class="plan-btn">Elite</a>
    </div>
  </section>

</div>

<!-- ===== SCRIPT ===== -->
<script>
  function goToApp(plan = null) {
    if (plan) {
      localStorage.setItem("xarvis_plan", plan);
    }
    window.location.href = "app.html";
  }

  function launchApp() {
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('main-site').classList.add('visible');

    setTimeout(() => {
      goToApp();
    }, 800);
  }

  // auto restore plan
  const urlParams = new URLSearchParams(window.location.search);
  const plan = urlParams.get("plan");
  if (plan) {
    localStorage.setItem("xarvis_plan", plan);
  }
</script>

</body>
</html>
