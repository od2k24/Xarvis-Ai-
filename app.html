<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Xarvis AI</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:DM Sans,sans-serif;
  background:#050810;
  color:#fff;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  padding:14px 18px;
  font-weight:700;
  background:#0d1120;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* MSG */
.msg{
  max-width:75%;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
  white-space:pre-wrap;
  line-height:1.4;
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#4f8eff,#7c3aff);
}

.bot{
  align-self:flex-start;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
}

/* INPUT */
.bar{
  display:flex;
  padding:12px;
  border-top:1px solid rgba(255,255,255,0.08);
  background:#0d1120;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.06);
  color:white;
}

button{
  margin-left:10px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  font-weight:700;
  color:white;
  cursor:pointer;
  background:linear-gradient(135deg,#4f8eff,#7c3aff);
}

button:hover{opacity:0.9}

.typing{
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>⚡ Xarvis AI</header>

<div id="chat"></div>

<div class="bar">
  <input id="input" placeholder="Ask Xarvis anything..." />
  <button onclick="send()">Send</button>
</div>

<script>

const BACKEND = "https://xarvis-ai.up.railway.app/api/chat";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

let history = [];

function add(text,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.textContent=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function typing(){
  const t=document.createElement("div");
  t.id="typing";
  t.className="typing";
  t.textContent="Xarvis is thinking...";
  chat.appendChild(t);
}

function stopTyping(){
  const t=document.getElementById("typing");
  if(t) t.remove();
}

async function send(){
  const msg=input.value.trim();
  if(!msg) return;

  add(msg,"user");
  input.value="";

  typing();

  try{
    const res=await fetch(BACKEND,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg,history})
    });

    const data=await res.json();
    stopTyping();

    if(!res.ok){
      add(data.error || "Server error","bot");
      return;
    }

    add(data.reply,"bot");

    history.push({role:"user",parts:[{text:msg}]});
    history.push({role:"model",parts:[{text:data.reply}]});

  }catch(e){
    stopTyping();
    add("Server error. Try again.","bot");
  }
}

input.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
