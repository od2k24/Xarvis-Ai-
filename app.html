<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xarvis AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #080b10;
    --surface:   #0d1117;
    --panel:     #111720;
    --border:    rgba(255,255,255,0.06);
    --accent:    #00d9c0;
    --accent2:   #0066ff;
    --glow:      rgba(0,217,192,0.18);
    --glow2:     rgba(0,102,255,0.12);
    --text:      #e8edf5;
    --muted:     #5a6480;
    --user-bg:   #0066ff;
    --ai-bg:     #111720;
    --radius:    14px;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.65;
    overflow: hidden;
  }

  /* ── background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,217,192,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,217,192,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── radial bloom ── */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 600px;
    background: radial-gradient(ellipse at center, var(--glow2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: grid;
    place-items: center;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--glow);
  }

  .logo-mark svg { display: block; }

  .logo-text {
    font-family: var(--font-head);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--text) 60%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-badge {
    margin-left: auto;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(0,217,192,0.3);
    font-size: 10px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: rgba(0,217,192,0.06);
  }

  /* ── messages area ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── empty state ── */
  .empty-state {
    margin: auto;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.6s ease both;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: grid;
    place-items: center;
    box-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow2);
  }

  .empty-title {
    font-family: var(--font-head);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .empty-sub {
    color: var(--muted);
    font-size: 13px;
    max-width: 340px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }

  .suggestion-chip {
    padding: 8px 16px;
    border-radius: 30px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .suggestion-chip:hover {
    border-color: rgba(0,217,192,0.4);
    color: var(--accent);
    background: rgba(0,217,192,0.05);
  }

  /* ── message row ── */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: fadeUp 0.3s ease both;
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-head);
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    box-shadow: 0 0 12px var(--glow);
  }

  .avatar.user-av {
    background: var(--user-bg);
    color: #fff;
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .bubble.ai {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
    color: #fff;
  }

  /* thinking dots */
  .thinking-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 18px;
  }

  .thinking-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite;
  }

  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* cursor blink for typing effect */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: cursorBlink 0.7s infinite;
  }

  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── input bar ── */
  #input-bar {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: rgba(0,217,192,0.35);
    box-shadow: 0 0 0 3px rgba(0,217,192,0.07);
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13.5px;
    resize: none;
    max-height: 140px;
    min-height: 24px;
    line-height: 1.6;
    padding: 2px 0;
  }

  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    display: grid;
    place-items: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,102,255,0.3);
  }

  #send-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,102,255,0.45); }
  #send-btn:active { transform: translateY(0); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    margin-top: 8px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── error bubble ── */
  .bubble.error {
    background: rgba(255,60,60,0.08);
    border: 1px solid rgba(255,60,60,0.25);
    color: #ff6b6b;
  }

  /* ── animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="#fff" stroke-width="1.5" fill="none"/>
        <circle cx="10" cy="10" r="2.5" fill="#fff"/>
      </svg>
    </div>
    <span class="logo-text">Xarvis AI</span>
    <span class="header-badge">Beta</span>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <path d="M15 3L26 9V21L15 27L4 21V9L15 3Z" stroke="#fff" stroke-width="1.8" fill="none"/>
          <circle cx="15" cy="15" r="4" fill="#fff"/>
        </svg>
      </div>
      <div class="empty-title">How can I help?</div>
      <div class="empty-sub">Ask me anything — strategy, code, ideas, analysis. I'm built to think with you.</div>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="sendSuggestion(this)">Grow a YouTube channel</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">Build a passive income stream</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">Write a viral hook</div>
        <div class="suggestion-chip" onclick="sendSuggestion(this)">Plan my week</div>
      </div>
    </div>
  </div>

  <div id="input-bar">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Message Xarvis..."
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <button id="send-btn" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M14 8L2 2L5.5 8L2 14L14 8Z" fill="white"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');

  let history = [];
  let busy    = false;

  // ── auto-resize textarea ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // ── keyboard shortcuts ──
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  function sendSuggestion(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ── create a message row in the DOM ──
  function createMessage(role, content = '') {
    if (emptyState) emptyState.remove();

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const av = document.createElement('div');
    av.className = `avatar ${role === 'user' ? 'user-av' : 'ai'}`;
    av.textContent = role === 'user' ? 'U' : 'X';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = content;

    row.appendChild(av);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();

    return bubble;
  }

  function showThinking() {
    if (emptyState) emptyState.remove();

    const row = document.createElement('div');
    row.className = 'msg-row';
    row.id = 'thinking-row';

    const av = document.createElement('div');
    av.className = 'avatar ai';
    av.textContent = 'X';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ai';
    bubble.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';

    row.appendChild(av);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeThinking() {
    const row = document.getElementById('thinking-row');
    if (row) row.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── typing effect ──
  function typeText(bubble, text) {
    return new Promise(resolve => {
      let i = 0;
      bubble.textContent = '';
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      bubble.appendChild(cursor);

      const speed = Math.max(8, Math.min(22, Math.round(3000 / text.length)));

      const tick = () => {
        if (i < text.length) {
          bubble.insertBefore(document.createTextNode(text[i]), cursor);
          i++;
          scrollToBottom();
          setTimeout(tick, speed);
        } else {
          cursor.remove();
          resolve();
        }
      };
      tick();
    });
  }

  // ── core send logic ──
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || busy) return;

    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    createMessage('user', text);
    showThinking();

    const prevHistory = [...history];
    history.push({ role: 'user', content: text });

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: prevHistory }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      if (!data.reply) throw new Error('Empty reply');

      removeThinking();
      const bubble = createMessage('assistant', '');
      await typeText(bubble, data.reply);
      history.push({ role: 'assistant', content: data.reply });

    } catch {
      removeThinking();
      const bubble = createMessage('assistant', '');
      bubble.className = 'bubble error';
      bubble.textContent = 'Server error — please try again.';
      history.pop();
    } finally {
      busy = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
