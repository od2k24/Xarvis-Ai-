<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xarvis AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0d12;
      --bg-2: #11141c;
      --surface: #161a23;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8eaf0;
      --text-2: #a0a6b3;
      --muted: #6b7280;
      --user: #2563eb;
      --ai: #1f2430;
      --accent: #7c3aed;
      --gradient: linear-gradient(135deg, #2563eb, #7c3aed);
      --error: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-2);
      flex-shrink: 0;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      font-size: 0.95rem;
    }

    .title {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 0.72rem;
      color: var(--text-2);
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .chat::-webkit-scrollbar { width: 8px; }
    .chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .empty {
      margin: auto;
      text-align: center;
      color: var(--text-2);
      max-width: 420px;
      padding: 40px 16px;
    }

    .empty h2 {
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .empty p {
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
    }

    .msg.user .avatar { background: var(--user); }
    .msg.ai .avatar { background: var(--gradient); }

    .bubble {
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 0.93rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user .bubble {
      background: var(--user);
      color: #fff;
      border-top-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--ai);
      color: var(--text);
      border-top-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg.error .bubble {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--error);
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-2);
      animation: bounce 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .composer {
      padding: 14px 16px 18px;
      border-top: 1px solid var(--border);
      background: var(--bg-2);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: rgba(124,58,237,0.5);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 160px;
      min-height: 24px;
      line-height: 1.4;
      padding: 6px 0;
    }

    textarea::placeholder { color: var(--muted); }

    .send {
      background: var(--gradient);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .send:hover:not(:disabled) { transform: translateY(-1px); }
    .send:disabled { opacity: 0.4; cursor: not-allowed; }

    .send svg { width: 16px; height: 16px; }

    .hint {
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">X</div>
      <div>
        <div class="title">Xarvis AI</div>
        <div class="subtitle">Always-on assistant</div>
      </div>
    </header>

    <div class="chat" id="chat">
      <div class="empty" id="empty">
        <h2>How can I help you today?</h2>
        <p>Ask me anything — I'll think it through and respond.</p>
      </div>
    </div>

    <div class="composer">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Message Xarvis AI..." autocomplete="off"></textarea>
        <button class="send" id="send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </div>
      <div class="hint">Press Enter to send · Shift+Enter for newline</div>
    </div>
  </div>

  <script>
    const API_URL = 'https://xarvis-ai.up.railway.app/chat';

    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    let isLoading = false;

    function autoGrow() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chat.scrollTop = chat.scrollHeight;
      });
    }

    function removeEmpty() {
      if (empty && empty.parentNode) empty.remove();
    }

    function addMessage(role, text) {
      removeEmpty();
      const msg = document.createElement('div');
      msg.className = 'msg ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'You' : 'X';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      scrollToBottom();
      return msg;
    }

    function addTypingIndicator() {
      removeEmpty();
      const msg = document.createElement('div');
      msg.className = 'msg ai';
      msg.id = 'typing-msg';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = 'X';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      scrollToBottom();
      return msg;
    }

    function removeTypingIndicator() {
      const t = document.getElementById('typing-msg');
      if (t) t.remove();
    }

    function addErrorMessage(text) {
      removeEmpty();
      const msg = document.createElement('div');
      msg.className = 'msg ai error';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '!';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      scrollToBottom();
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;

      addMessage('user', message);
      input.value = '';
      autoGrow();

      addTypingIndicator();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        removeTypingIndicator();

        if (!res.ok) {
          throw new Error('Request failed: ' + res.status);
        }

        const data = await res.json();
        const reply = (data && typeof data.reply === 'string' && data.reply.trim())
          ? data.reply
          : 'No reply received.';

        addMessage('ai', reply);
      } catch (err) {
        removeTypingIndicator();
        addErrorMessage('Connection error. Try again.');
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', autoGrow);

    input.focus();
  </script>
</body>
</html>
