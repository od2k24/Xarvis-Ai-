<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0d12" />
  <title>Xarvis AI — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0d12;
      --bg-2: #0f1218;
      --surface: #151924;
      --surface-2: #1b2030;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --text: #e7ecf3;
      --text-dim: #9aa3b2;
      --muted: #5b6577;
      --brand: #6b8afd;
      --brand-2: #8b5cf6;
      --gradient: linear-gradient(135deg, #6b8afd, #8b5cf6);
      --user-bubble: linear-gradient(135deg, #4f7dff, #6b5cf6);
      --ai-bubble: #1b2030;
      --danger: #f87171;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(139, 92, 246, 0.10), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(107, 138, 253, 0.10), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(11, 13, 18, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .logo {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--gradient);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: #fff;
      box-shadow: 0 6px 18px rgba(107, 138, 253, 0.35);
    }
    .title { display: flex; flex-direction: column; line-height: 1.1; }
    .title b { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .title span {
      font-size: 12px; color: var(--text-dim);
      display: inline-flex; align-items: center; gap: 6px; margin-top: 2px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #34d399;
      box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6);
      animation: pulse 1.8s infinite;
    }
    .status-dot.offline { background: var(--danger); animation: none; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.55); }
      70% { box-shadow: 0 0 0 8px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
    }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, border-color .15s, transform .15s;
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
    .icon-btn:active { transform: scale(0.96); }
    .icon-btn svg { width: 16px; height: 16px; }
    .chat {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
      padding: 28px 20px 20px;
      display: flex; flex-direction: column;
    }
    .chat::-webkit-scrollbar { width: 10px; }
    .chat::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.06); border-radius: 10px;
      border: 2px solid transparent; background-clip: padding-box;
    }
    .chat::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); background-clip: padding-box; border: 2px solid transparent; }
    .messages {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .empty {
      max-width: 760px;
      width: 100%;
      margin: auto;
      text-align: center;
      padding: 40px 16px;
      animation: rise .5s ease both;
    }
    .empty .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      font-size: 12px; color: var(--text-dim);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; margin-bottom: 18px;
    }
    .empty h1 {
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 700; letter-spacing: -0.02em; line-height: 1.15;
      margin-bottom: 10px;
    }
    .empty h1 .grad {
      background: var(--gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .empty p { color: var(--text-dim); font-size: 15px; max-width: 520px; margin: 0 auto; }
    .suggestions {
      margin-top: 26px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .suggestion {
      text-align: left;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      cursor: pointer;
      font-size: 14px; font-family: inherit;
      transition: background .15s, border-color .15s, transform .15s;
    }
    .suggestion:hover { background: var(--surface-2); border-color: var(--border-strong); transform: translateY(-1px); }
    .suggestion small { display: block; color: var(--text-dim); font-size: 12px; margin-top: 4px; }
    @media (max-width: 560px) { .suggestions { grid-template-columns: 1fr; } }
    .row {
      display: flex; align-items: flex-end; gap: 10px;
      animation: rise .28s ease both;
    }
    .row.user { justify-content: flex-end; }
    .avatar {
      width: 30px; height: 30px; flex-shrink: 0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .avatar.ai { background: var(--gradient); border: none; }
    .bubble {
      max-width: min(78%, 640px);
      padding: 12px 15px;
      border-radius: var(--radius-lg);
      font-size: 15px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
      box-shadow: var(--shadow);
    }
    .row.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
      color: var(--text);
    }
    .row.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .bubble.error {
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: #fecaca;
    }
    .typing { display: inline-flex; align-items: center; gap: 5px; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim);
      animation: blink 1.3s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .composer-wrap {
      flex-shrink: 0;
      padding: 12px 16px 18px;
      background: linear-gradient(to top, var(--bg) 60%, rgba(11, 13, 18, 0));
    }
    .composer {
      max-width: 820px; margin: 0 auto;
      display: flex; align-items: flex-end; gap: 10px;
      padding: 10px 10px 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      transition: border-color .15s, box-shadow .15s;
    }
    .composer:focus-within {
      border-color: rgba(107, 138, 253, 0.55);
      box-shadow: 0 0 0 4px rgba(107, 138, 253, 0.12), 0 12px 30px rgba(0,0,0,.35);
    }
    .composer textarea {
      flex: 1;
      min-height: 24px; max-height: 180px;
      resize: none;
      background: transparent;
      border: none; outline: none;
      color: var(--text);
      font-size: 15px; line-height: 1.5;
      font-family: inherit;
      padding: 6px 0;
    }
    .composer textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px; height: 40px;
      flex-shrink: 0;
      border: none; border-radius: 12px;
      background: var(--gradient);
      color: #fff;
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: opacity .15s, transform .15s, box-shadow .15s;
      box-shadow: 0 6px 18px rgba(107, 138, 253, 0.35);
    }
    .send-btn:hover:not(:disabled) { transform: translateY(-1px); }
    .send-btn:active:not(:disabled) { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .send-btn svg { width: 18px; height: 18px; }
    .hint {
      max-width: 820px;
      margin: 8px auto 0;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 600px) {
      .header { padding: 12px 14px; }
      .chat { padding: 20px 12px 14px; }
      .composer-wrap { padding: 10px 10px 14px; }
      .bubble { max-width: 85%; font-size: 14.5px; }
      .empty { padding: 24px 8px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">X</div>
    <div class="title">
      <b>Xarvis AI</b>
      <span><i class="status-dot" id="statusDot"></i><span id="statusText">Online</span></span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clearBtn" title="New chat" aria-label="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>
  </header>
  <main class="chat" id="chat">
    <div class="messages" id="messages">
      <div class="empty" id="empty">
        <div class="badge"><i class="status-dot"></i> Ready when you are</div>
        <h1>How can I <span class="grad">help</span> you today?</h1>
        <p>Ask anything — get instant answers, ideas, and explanations.</p>
        <div class="suggestions">
          <button class="suggestion" data-prompt="Explain quantum computing in simple terms">
            Explain quantum computing
            <small>in simple terms</small>
          </button>
          <button class="suggestion" data-prompt="Write a short poem about the ocean at midnight">
            Write a short poem
            <small>about the ocean at midnight</small>
          </button>
          <button class="suggestion" data-prompt="Give me 5 productivity tips for remote work">
            5 productivity tips
            <small>for remote work</small>
          </button>
          <button class="suggestion" data-prompt="What are the best practices for learning a new language?">
            Best practices
            <small>for learning a new language</small>
          </button>
        </div>
      </div>
    </div>
  </main>
  <div class="composer-wrap">
    <form class="composer" id="composer" autocomplete="off">
      <textarea
        id="input"
        rows="1"
        placeholder="Send a message..."
        aria-label="Message"></textarea>
      <button type="submit" class="send-btn" id="sendBtn" aria-label="Send" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </form>
    <div class="hint">Enter to send · Shift + Enter for a new line</div>
  </div>
  <script>
    (function () {
      const API_URL = 'https://xarvis-ai.up.railway.app/chat';
      const chatEl = document.getElementById('chat');
      const messagesEl = document.getElementById('messages');
      const emptyEl = document.getElementById('empty');
      const form = document.getElementById('composer');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const clearBtn = document.getElementById('clearBtn');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      let isLoading = false;
      function setStatus(online) {
        if (online) {
          statusDot.classList.remove('offline');
          statusText.textContent = 'Online';
        } else {
          statusDot.classList.add('offline');
          statusText.textContent = 'Offline';
        }
      }
      function autosize() {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 180) + 'px';
        sendBtn.disabled = !input.value.trim() || isLoading;
      }
      function scrollToBottom() {
        requestAnimationFrame(() => {
          chatEl.scrollTop = chatEl.scrollHeight;
        });
      }
      function escapeHTML(str) {
        return str.replace(/[&<>"']/g, (c) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        })[c]);
      }
      function renderText(text) {
        const escaped = escapeHTML(text);
        return escaped.replace(/(https?:\/\/[^\s<]+)/g, (m) =>
          `<a href="${m}" target="_blank" rel="noopener noreferrer" style="color:#9ab3ff;text-decoration:underline;">${m}</a>`
        );
      }
      function hideEmpty() {
        if (emptyEl && emptyEl.parentNode) {
          emptyEl.remove();
        }
      }
      function addMessage(role, text, opts = {}) {
        hideEmpty();
        const row = document.createElement('div');
        row.className = 'row ' + role;
        const avatar = document.createElement('div');
        avatar.className = 'avatar ' + (role === 'ai' ? 'ai' : '');
        avatar.textContent = role === 'ai' ? 'X' : 'U';
        const bubble = document.createElement('div');
        bubble.className = 'bubble' + (opts.error ? ' error' : '');
        if (opts.typing) {
          bubble.innerHTML = '<div class="typing" aria-label="Thinking"><span></span><span></span><span></span></div>';
        } else {
          bubble.innerHTML = renderText(text);
        }
        if (role === 'user') {
          row.appendChild(bubble);
          row.appendChild(avatar);
        } else {
          row.appendChild(avatar);
          row.appendChild(bubble);
        }
        messagesEl.appendChild(row);
        scrollToBottom();
        return { row, bubble };
      }
      async function sendMessage(text) {
        if (!text || isLoading) return;
        isLoading = true;
        sendBtn.disabled = true;
        addMessage('user', text);
        input.value = '';
        autosize();
        const thinking = addMessage('ai', '', { typing: true });
        try {
          const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ message: text })
          });
          if (!res.ok) {
            throw new Error('Server returned ' + res.status);
          }
          const data = await res.json();
          const reply = (data && (data.reply || data.message || data.response)) || '';
          if (!reply) {
            thinking.bubble.classList.add('error');
            thinking.bubble.innerHTML = renderText('I received an empty response. Please try again.');
          } else {
            thinking.bubble.innerHTML = renderText(String(reply));
          }
          setStatus(true);
        } catch (err) {
          thinking.bubble.classList.add('error');
          thinking.bubble.innerHTML = renderText(
            'Sorry — I could not reach the server. Please check your connection and try again.'
          );
          setStatus(false);
        } finally {
          isLoading = false;
          autosize();
          input.focus();
          scrollToBottom();
        }
      }
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (text) sendMessage(text);
      });
      input.addEventListener('input', autosize);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const text = input.value.trim();
          if (text) sendMessage(text);
        }
      });
      const emptyTemplate = emptyEl.cloneNode(true);
      function attachSuggestions(scope) {
        scope.querySelectorAll('.suggestion').forEach((btn) => {
          btn.addEventListener('click', () => {
            const prompt = btn.getAttribute('data-prompt') || btn.textContent.trim();
            sendMessage(prompt);
          });
        });
      }
      attachSuggestions(document);
      clearBtn.addEventListener('click', () => {
        if (isLoading) return;
        messagesEl.innerHTML = '';
        const clone = emptyTemplate.cloneNode(true);
        messagesEl.appendChild(clone);
        attachSuggestions(clone);
        input.focus();
      });
      window.addEventListener('load', () => {
        input.focus();
        autosize();
      });
    })();
  </script>
</body>
</html>
