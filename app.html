<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xarvis AI — Creator OS</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
/* KEEPING YOUR ORIGINAL UI — ONLY MINIMAL FIXES */
body { margin:0; background:#04060f; color:#e8eeff; font-family:'DM Sans',sans-serif; display:flex; height:100vh; }
.chat-area { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
.message-row { display:flex; max-width:700px; }
.message-row.user { margin-left:auto; flex-direction:row-reverse; }
.msg-bubble { padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.6; }
.msg-bubble.bot { background:#111826; }
.msg-bubble.user { background:linear-gradient(135deg,#4f8eff,#7c3aff); color:#fff; }
.input-area { padding:10px; border-top:1px solid rgba(255,255,255,0.06); }
.input-wrap { display:flex; gap:8px; }
textarea { flex:1; resize:none; background:#0c1120; border:none; color:#fff; padding:10px; border-radius:10px; }
button { cursor:pointer; }
.send-btn { background:#4f8eff; border:none; color:white; padding:10px 14px; border-radius:10px; }
.typing { opacity:0.7; font-style:italic; }
</style>
</head>

<body>

<div style="flex:1; display:flex; flex-direction:column;">
  <div class="chat-area" id="chat-area"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="chat-input" placeholder="Ask Xarvis anything…"></textarea>
      <button class="send-btn" id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ✅ FIXED BACKEND URL */
const BACKEND_URL = "https://xarvis-ai.up.railway.app";

/* STATE */
let isSending = false;

/* ELEMENTS */
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const chatArea = document.getElementById('chat-area');

/* SEND MESSAGE */
async function sendMessage() {
  if (isSending) return;

  const text = input.value.trim();
  if (!text) return;

  isSending = true;

  input.value = '';
  addMessage('user', text);

  const typingEl = addTyping();

  try {
    const res = await fetch(`${BACKEND_URL}/chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ message: text })
    });

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    removeTyping(typingEl);

    addMessage('bot', data.reply || "No response");

  } catch (err) {
    removeTyping(typingEl);
    addMessage('bot', "⚠️ Error connecting to server.");
    console.error(err);
  }

  isSending = false;
}

/* UI HELPERS */
function addMessage(role, text) {
  const row = document.createElement('div');
  row.className = `message-row ${role === 'user' ? 'user' : ''}`;

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${role}`;
  bubble.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");

  row.appendChild(bubble);
  chatArea.appendChild(row);

  scrollBottom();
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'message-row';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble bot typing';
  bubble.textContent = 'Xarvis is thinking…';

  row.appendChild(bubble);
  chatArea.appendChild(row);

  scrollBottom();
  return row;
}

function removeTyping(el) {
  if (el) el.remove();
}

function scrollBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, tag => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[tag]));
}

/* EVENTS */
sendBtn.addEventListener('click', sendMessage);

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* AUTO RESIZE */
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
});
</script>

</body>
</html>
