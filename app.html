<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xarvis AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
}

#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.message {
  margin-bottom: 12px;
  line-height: 1.4;
}

.user {
  color: #38bdf8;
}

.ai {
  color: #a78bfa;
}

footer {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  background: #6366f1;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<header>Xarvis AI</header>

<div id="chat"></div>

<footer>
  <input id="input" placeholder="Ask Xarvis..." />
  <button onclick="sendMessage()">Send</button>
</footer>

<script>
const BACKEND_URL = "https://YOUR-BACKEND-URL/chat"; // 🔴 CHANGE THIS

async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = input.value.trim();
  if (!text) return;

  // show user message
  chat.innerHTML += `<div class="message user">You: ${text}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  // show loading
  const loadingId = Date.now();
  chat.innerHTML += `<div class="message ai" id="${loadingId}">Xarvis: typing...</div>`;

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    document.getElementById(loadingId).innerHTML =
      `Xarvis: ${data.reply || "No response"}`;

  } catch (err) {
    document.getElementById(loadingId).innerHTML =
      "Xarvis: ⚠️ Connection error";
  }

  chat.scrollTop = chat.scrollHeight;
}

// ENTER KEY SUPPORT
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
