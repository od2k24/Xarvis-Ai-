<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xarvis AI — Creator Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#050810;--surface:#0d1120;--surface2:#111827;--border:rgba(255,255,255,0.07);
      --border2:rgba(255,255,255,0.12);--accent:#4f8eff;--accent2:#7c3aff;--text:#f0f4ff;
      --muted:#8895b0;--muted2:#5a6580;--card:rgba(255,255,255,0.04);--green:#3fff88;
      --sidebar-w:260px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
    .sidebar-header{padding:18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .logo{font-family:'Syne';font-weight:800;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .plan-pill{font-size:.7rem;padding:3px 10px;border-radius:50px;background:rgba(63,255,136,.1);border:1px solid rgba(63,255,136,.2);color:var(--green)}

    .sidebar-actions{display:flex;gap:8px;padding:12px}
    .new-chat-btn{flex:1;padding:9px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;cursor:pointer}

    /* MAIN */
    .main{flex:1;display:flex;flex-direction:column}

    .topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

    .chat-area{flex:1;overflow:auto;padding:24px;display:flex;flex-direction:column;gap:16px}

    .message-row{display:flex;gap:10px;max-width:800px}
    .message-row.user{align-self:flex-end;flex-direction:row-reverse}

    .msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--card)}
    .msg-avatar.bot{background:linear-gradient(135deg,var(--accent),var(--accent2))}

    .msg-bubble{padding:12px 14px;border-radius:14px;max-width:80%}
    .msg-bubble.bot{background:var(--surface);border:1px solid var(--border)}
    .msg-bubble.user{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

    .input-area{padding:14px;border-top:1px solid var(--border)}
    .input-wrap{display:flex;gap:10px;background:var(--surface);padding:10px;border-radius:14px;border:1px solid var(--border2)}
    textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);resize:none}

    .send-btn{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer}

    .suggestion-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .suggestion-card{padding:14px;border-radius:12px;background:var(--card);border:1px solid var(--border);cursor:pointer}

    /* FIX MOBILE SIDEBAR */
    @media(max-width:768px){
      .sidebar{position:fixed;left:-100%;transition:.3s}
      .sidebar.open{left:0}
    }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">Xarvis AI</div>
    <div class="plan-pill" id="plan">Starter</div>
  </div>

  <div class="sidebar-actions">
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  </div>
</aside>

<div class="main">

  <div class="topbar">
    <button onclick="toggleSidebar()">☰</button>
    <div>Online</div>
    <button onclick="openUpgrade()">Upgrade</button>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Ask Xarvis..."></textarea>
      <button class="send-btn" onclick="send()">➤</button>
    </div>
  </div>
</div>

<script>
let messages=[];

function render(msg,role){
  const chat=document.getElementById('chat');
  const row=document.createElement('div');
  row.className='message-row '+(role==='user'?'user':'');
  row.innerHTML=`<div class='msg-avatar'>${role==='user'?'U':'X'}</div><div class='msg-bubble ${role}'>${msg}</div>`;
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
}

function send(){
  const input=document.getElementById('input');
  if(!input.value.trim())return;
  const text=input.value;
  input.value='';
  render(text,'user');
  setTimeout(()=>render('Xarvis response coming soon...','bot'),600);
}

function newChat(){document.getElementById('chat').innerHTML='';messages=[];}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

// FIX: event bug removed
function selectPlan(plan){document.getElementById('plan').innerText=plan.toUpperCase();}

</script>
</body>
</html>
