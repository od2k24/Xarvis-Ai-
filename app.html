<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xarvis AI - App</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      background: #050810;
      color: #f0f4ff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px 20px;
      background: rgba(13, 17, 32, 0.9);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-family: "Syne", sans-serif;
      font-weight: 800;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 75%;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #4f8eff, #7c3aff);
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .input-bar {
      display: flex;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(13,17,32,0.95);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.06);
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f8eff, #7c3aff);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      opacity: 0.9;
    }

    .typing {
      font-size: 0.85rem;
      opacity: 0.7;
      padding-left: 6px;
    }
  </style>
</head>
<body>

<header>Xarvis AI ⚡</header>

<div class="chat-container" id="chat"></div>

<div class="input-bar">
  <input id="input" placeholder="Ask Xarvis anything..." />
  <button onclick="send()">Send</button>
</div>

<script>
const BACKEND_URL = "https://xarvis-ai.up.railway.app/api/chat";
const chatBox = document.getElementById("chat");
const input = document.getElementById("input");

let history = [];

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing";
  div.innerText = "Xarvis is thinking...";
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  addTyping();

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message, history })
    });

    const data = await res.json();

    removeTyping();

    if (!res.ok) {
      addMessage("Error: " + (data.error || "Server failed"), "bot");
      return;
    }

    addMessage(data.reply, "bot");

    history.push({ role: "user", parts: [{ text: message }] });
    history.push({ role: "model", parts: [{ text: data.reply }] });

  } catch (err) {
    removeTyping();
    addMessage("Server error. Please try again.", "bot");
    console.error(err);
  }
}

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
