<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xarvis AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0c10;
  --bg-gradient: radial-gradient(1200px 600px at 80% -10%, #1f2937 0%, #0b0c10 50%), 
                 radial-gradient(800px 400px at -10% 100%, #111827 0%, #0b0c10 60%);
  --card: #111318;
  --card-hover: #161a21;
  --border: #1f2430;
  --text: #e5e7eb;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --accent: #6366f1;
  --accent-hover: #4f46e5;
  --accent-glow: rgba(99, 102, 241, 0.2);
  --user-msg: #1e293b;
  --bot-msg: #111318;
  --error: #ef4444;
  --radius: 14px;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  background-image: var(--bg-gradient);
  color: var(--text);
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 16px;
}

.header {
  padding: 20px 0 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-radius: 10px;
  display: grid;
  place-items: center;
  box-shadow: 0 0 24px var(--accent-glow);
  font-weight: 700;
  font-size: 18px;
}

.brand-text h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.brand-text p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.clear-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 13px;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: var(--transition);
}

.clear-btn:hover {
  background: var(--card);
  color: var(--text);
  border-color: #2a3140;
}

.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px 4px;
  scroll-behavior: smooth;
}

.chat-container::-webkit-scrollbar {
  width: 6px;
}

.chat-container::-webkit-scrollbar-thumb {
  background: #2a3140;
  border-radius: 3px;
}

.chat-container::-webkit-scrollbar-thumb:hover {
  background: #3a4252;
}

.welcome {
  text-align: center;
  padding: 48px 20px;
  max-width: 500px;
  margin: 0 auto;
}

.welcome-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-radius: 18px;
  display: grid;
  place-items: center;
  margin: 0 auto 20px;
  font-size: 28px;
  box-shadow: 0 0 32px var(--accent-glow);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.welcome h2 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.welcome p {
  color: var(--text-secondary);
  font-size: 15px;
  line-height: 1.6;
}

.suggestions {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 12px;
  margin-top: 32px;
}

.suggestion {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: left;
  cursor: pointer;
  transition: var(--transition);
  font-size: 14px;
  color: var(--text-secondary);
}

.suggestion:hover {
  background: var(--card-hover);
  border-color: #2a3140;
  color: var(--text);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.message {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.message.user {
  flex-direction: row-reverse;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 14px;
  font-weight: 600;
  flex-shrink: 0;
}

.message.user .avatar {
  background: var(--user-msg);
  border: 1px solid #2a3140;
}

.message.bot .avatar {
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
}

.bubble {
  max-width: 75%;
  padding: 14px 16px;
  border-radius: var(--radius);
  font-size: 15px;
  line-height: 1.6;
  border: 1px solid var(--border);
}

.message.user .bubble {
  background: var(--user-msg);
  border-color: #2a3140;
  border-bottom-right-radius: 4px;
}

.message.bot .bubble {
  background: var(--bot-msg);
  border-bottom-left-radius: 4px;
}

.bubble p {
  white-space: pre-wrap;
  word-wrap: break-word;
}

.bubble code {
  background: #1a1f2e;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
  font-family: 'Menlo', 'Monaco', monospace;
}

.typing {
  display: flex;
  gap: 6px;
  padding: 14px 16px;
}

.typing span {
  width: 8px;
  height: 8px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}

.typing span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-6px); opacity: 1; }
}

.input-area {
  padding: 16px 0 24px;
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
}

.input-wrapper {
  display: flex;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 6px 18px;
  transition: var(--transition);
}

.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  resize: none;
  max-height: 120px;
  line-height: 1.5;
  padding: 10px 0;
}

.input::placeholder {
  color: var(--text-muted);
}

.send-btn {
  background: var(--accent);
  border: none;
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
  color: white;
}

.send-btn:hover:not(:disabled) {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px var(--accent-glow);
}

.send-btn:active:not(:disabled) {
  transform: translateY(0);
}

.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.footer {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  padding-top: 12px;
}

.error-msg {
  color: var(--error);
}

@media (max-width: 640px) {
  .app {
    padding: 0 12px;
  }
  .bubble {
    max-width: 85%;
  }
  .suggestions {
    grid-template-columns: 1fr;
  }
  .welcome {
    padding: 32px 16px;
  }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <div class="logo">X</div>
      <div class="brand-text">
        <h1>Xarvis AI</h1>
        <p>Your intelligent assistant</p>
      </div>
    </div>
    <button class="clear-btn" id="clearBtn">Clear Chat</button>
  </header>

  <main class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✨</div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything. I'm powered by AI and ready to assist with writing, coding, analysis, and more.</p>
      <div class="suggestions">
        <button class="suggestion" data-prompt="Explain quantum computing in simple terms">Explain quantum computing in simple terms</button>
        <button class="suggestion" data-prompt="Write a React component for a todo list">Write a React component for a todo list</button>
        <button class="suggestion" data-prompt="Give me 5 creative blog post ideas about AI">Give me 5 creative blog post ideas about AI</button>
        <button class="suggestion" data-prompt="Debug this JavaScript: fetch('/api').then()">Debug this JavaScript: fetch('/api').then()</button>
      </div>
    </div>
  </main>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea 
        class="input" 
        id="input" 
        placeholder="Message Xarvis AI..." 
        rows="1"
        autocomplete="off"
      ></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="footer">Xarvis AI can make mistakes. Verify important info.</div>
  </div>
</div>

<script>
const chatContainer = document.getElementById('chatContainer');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const welcome = document.getElementById('welcome');

let isLoading = false;
let messages = [];

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function createMessage(content, isUser = false, isError = false) {
  const messageEl = document.createElement('div');
  messageEl.className = `message ${isUser ? 'user' : 'bot'}`;
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = isUser ? 'U' : 'X';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  
  if (isError) {
    bubble.classList.add('error-msg');
  }
  
  const p = document.createElement('p');
  p.textContent = content;
  bubble.appendChild(p);
  
  messageEl.appendChild(avatar);
  messageEl.appendChild(bubble);
  
  return messageEl;
}

function showTyping() {
  const messageEl = document.createElement('div');
  messageEl.className = 'message bot';
  messageEl.id = 'typing';
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'X';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span>';
  
  bubble.appendChild(typing);
  messageEl.appendChild(avatar);
  messageEl.appendChild(bubble);
  
  chatContainer.appendChild(messageEl);
  scrollToBottom();
}

function removeTyping() {
  const typing = document.getElementById('typing');
  if (typing) typing.remove();
}

function hideWelcome() {
  if (welcome) welcome.style.display = 'none';
}

function updateSendButton() {
  const hasText = input.value.trim().length > 0;
  sendBtn.disabled = !hasText || isLoading;
}

async function sendMessage(text) {
  const message = text.trim();
  if (!message || isLoading) return;
  
  hideWelcome();
  isLoading = true;
  updateSendButton();
  
  const userMsg = createMessage(message, true);
  chatContainer.appendChild(userMsg);
  messages.push({ role: 'user', content: message });
  
  input.value = '';
  autoResize();
  scrollToBottom();
  showTyping();
  
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });
    
    if (!response.ok) {
      throw new Error(`Request failed: ${response.status}`);
    }
    
    const data = await response.json();
    removeTyping();
    
    const reply = data.reply || 'No response received';
    const botMsg = createMessage(reply, false);
    chatContainer.appendChild(botMsg);
    messages.push({ role: 'assistant', content: reply });
    
  } catch (error) {
    removeTyping();
    const errorMsg = createMessage('Something went wrong. Please try again.', false, true);
    chatContainer.appendChild(errorMsg);
    console.error('Chat error:', error);
  } finally {
    isLoading = false;
    updateSendButton();
    scrollToBottom();
    input.focus();
  }
}

function clearChat() {
  messages = [];
  chatContainer.innerHTML = '';
  chatContainer.appendChild(welcome);
  welcome.style.display = 'block';
  input.focus();
}

input.addEventListener('input', () => {
  autoResize();
  updateSendButton();
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(input.value);
  }
});

sendBtn.addEventListener('click', () => {
  sendMessage(input.value);
});

clearBtn.addEventListener('click', clearChat);

document.querySelectorAll('.suggestion').forEach(btn => {
  btn.addEventListener('click', () => {
    const prompt = btn.getAttribute('data-prompt');
    input.value = prompt;
    autoResize();
    updateSendButton();
    input.focus();
  });
});

updateSendButton();
input.focus();
</script>
</body>
</html>
