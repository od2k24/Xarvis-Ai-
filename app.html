<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Xarvis AI — Creator OS</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  background:#04060f;
  color:#e8eeff;
  font-family:'DM Sans',sans-serif;
  height:100vh;
  display:flex;
}

.chat-area{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.message-row{
  display:flex;
  max-width:700px;
}

.message-row.user{
  margin-left:auto;
  flex-direction:row-reverse;
}

.msg-bubble{
  padding:10px 14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
  word-break:break-word;
  white-space:pre-wrap;
}

.msg-bubble.bot{
  background:#111826;
}

.msg-bubble.user{
  background:linear-gradient(135deg,#4f8eff,#7c3aff);
  color:#fff;
}

.input-area{
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.06);
}

.input-wrap{
  display:flex;
  gap:8px;
}

textarea{
  flex:1;
  resize:none;
  background:#0c1120;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:10px;
  outline:none;
  font-family:inherit;
  max-height:120px;
}

.send-btn{
  background:#4f8eff;
  border:none;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

.typing{
  opacity:0.7;
  font-style:italic;
}
</style>
</head>

<body>

<div style="flex:1;display:flex;flex-direction:column;">

  <div class="chat-area" id="chat"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Ask Xarvis anything..."></textarea>
      <button class="send-btn" id="send">Send</button>
    </div>
  </div>

</div>

<script>
'use strict';

const API = "https://xarvis-ai.up.railway.app/chat";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

let sending = false;

function addMsg(role,text){
  const row=document.createElement("div");
  row.className="message-row "+(role==="user"?"user":"");

  const bubble=document.createElement("div");
  bubble.className="msg-bubble "+role;
  bubble.textContent=text;

  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
}

function typing(){
  const row=document.createElement("div");
  row.className="message-row";

  const bubble=document.createElement("div");
  bubble.className="msg-bubble bot typing";
  bubble.textContent="Xarvis is thinking...";

  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;

  return row;
}

async function sendMsg(){
  if(sending) return;

  const text=input.value.trim();
  if(!text) return;

  sending=true;

  addMsg("user",text);
  input.value="";

  const t=typing();

  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),20000);

    const res=await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text}),
      signal:controller.signal
    });

    clearTimeout(timeout);

    const data=await res.json();

    t.remove();

    if(!res.ok) throw new Error();

    addMsg("bot",data.reply||"No response");

  }catch(e){
    t.remove();
    addMsg("bot","⚠️ Error connecting to server.");
  }

  sending=false;
}

send.onclick=sendMsg;

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    sendMsg();
  }
});

input.addEventListener("input",()=>{
  input.style.height="auto";
  input.style.height=input.scrollHeight+"px";
});
</script>

</body>
</html>
