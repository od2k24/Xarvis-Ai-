<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xarvis AI — Creator OS v4</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:#050810;
      --surface:#0d1120;
      --border:rgba(255,255,255,0.08);
      --text:#f0f4ff;
      --muted:#8895b0;
      --accent:#4f8eff;
      --accent2:#7c3aff;
      --green:#3fff88;
      --card:rgba(255,255,255,0.04);
      --glow:rgba(79,142,255,0.25);
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:DM Sans,sans-serif;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    /* SIDEBAR */
    .sidebar{
      width:260px;
      background:var(--surface);
      border-right:1px solid var(--border);
      display:flex;
      flex-direction:column;
    }

    .logo{
      font-family:Syne;
      font-weight:800;
      padding:16px;
      font-size:1.1rem;
      background:linear-gradient(135deg,#fff,var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .status{
      padding:10px 16px;
      font-size:0.75rem;
      color:var(--muted);
    }

    .main{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    /* TOPBAR */
    .topbar{
      padding:12px 16px;
      border-bottom:1px solid var(--border);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .title{
      font-family:Syne;
      font-weight:700;
    }

    .badge{
      font-size:0.7rem;
      padding:4px 10px;
      border-radius:20px;
      background:rgba(63,255,136,0.1);
      color:var(--green);
      border:1px solid rgba(63,255,136,0.2);
    }

    /* CHAT */
    .chat{
      flex:1;
      padding:20px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .msg{
      max-width:70%;
      padding:12px 14px;
      border-radius:14px;
      line-height:1.5;
      font-size:0.9rem;
    }

    .user{
      align-self:flex-end;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
    }

    .bot{
      align-self:flex-start;
      background:var(--card);
      border:1px solid var(--border);
    }

    /* INPUT */
    .input{
      padding:14px;
      border-top:1px solid var(--border);
      display:flex;
      gap:10px;
    }

    textarea{
      flex:1;
      resize:none;
      border:none;
      outline:none;
      background:var(--surface);
      color:var(--text);
      padding:10px;
      border-radius:10px;
      font-family:inherit;
    }

    button{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;
      color:white;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
    }

    .note{
      font-size:0.7rem;
      color:var(--muted);
      text-align:center;
      padding:6px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">XARVIS AI</div>
    <div class="status">⚡ Creator OS v4 Active</div>
  </div>

  <div class="main">

    <div class="topbar">
      <div class="title">AI Chat</div>
      <div class="badge">READY</div>
    </div>

    <div class="chat" id="chat">
      <div class="msg bot">Welcome back. What are we building today?</div>
    </div>

    <div class="input">
      <textarea id="input" placeholder="Ask Xarvis..."></textarea>
      <button onclick="send()">Send</button>
    </div>

    <div class="note">
      Backend required: connect /api/chat (Groq or OpenAI). No API keys in frontend.
    </div>

  </div>

<script>
async function send(){
  const input = document.getElementById('input');
  const chat = document.getElementById('chat');

  if(!input.value.trim()) return;

  chat.innerHTML += `<div class='msg user'>${input.value}</div>`;

  const userMessage = input.value;
  input.value = '';

  chat.innerHTML += `<div class='msg bot'>Thinking...</div>`;

  try {
    // SAFE ARCHITECTURE: backend only
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ message:userMessage })
    });

    const data = await res.json();

    chat.lastChild.innerHTML = data.reply || "No response";
  } catch(e){
    chat.lastChild.innerHTML = "AI offline. Backend not connected.";
  }
}
</script>

</body>
</html>
